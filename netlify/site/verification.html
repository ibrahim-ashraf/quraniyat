<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>التحقق من رقم هاتفك</h1>
    <form name="verification" method="post" data-netlify="true">
        <input type="text" name="name" id="name" placeholder="أدخل اسمك"><br>
        <input type="tel" name="phone" id="phone" placeholder="أدخل رقم هاتفك"><br>
        <button id="send_phone_otp_btn" onclick="sendPhoneOtp(event)">إرسال رمز التحقق من رقم الهاتف</button>
        <input type="number" name="phone-verification-code-edit" id="phone_verification_code_edit" placeholder="أدخل رمز التحقق"><br>
        <button id="verify_phone_otp_btn" onclick="verifyPhoneOtp(event)">التحقق من رقم الهاتف</button>
        <input type="email" name="email" id="email" placeholder="أدخل بريدك الإلكتروني"><br>
        <input type="submit" value="تحقق" onclick="submitForm()">
    </form>
    <script src="verification.js"></script>
</body>
</html>
